<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>설문 양식 작성</title>
<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.container{width:500px;margin:50px auto;}
input{width:100%;margin-top:10px;padding:10px;}
button{margin-top:15px;padding:10px;background:white;color:black;cursor:pointer;}
</style>
</head>
<body>

<div class="container">
<h1>지원서 설문 만들기</h1>
<div id="questionArea"></div>
<button id="addQuestion">질문 추가</button>
<button id="saveForm">설문 저장</button>
<p id="message"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
  authDomain: "songdo-exp-1e5a5.firebaseapp.com",
  databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "songdo-exp-1e5a5",
  storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
  messagingSenderId: "28967825486",
  appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let questionCount = 0;

document.getElementById("addQuestion").onclick = function(){
    let input = document.createElement("input");
    input.placeholder = "질문 입력";
    input.id = "q" + questionCount;
    document.getElementById("questionArea").appendChild(input);
    questionCount++;
};

document.getElementById("saveForm").onclick = async function(){

    let questions = {};

    for(let i=0; i<questionCount; i++){
        let value = document.getElementById("q"+i).value;
        if(value.trim() !== ""){
            questions[i] = value;
        }
    }

    await set(ref(db, "form/questions"), questions);
    document.getElementById("message").innerText = "설문 저장 완료!";
};

</script>
</body>
</html>
