<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>지원서 작성</title>
<style>
body{background:black;color:white;text-align:center;font-family:Arial;}
.container{width:500px;margin:50px auto;}
input,textarea{width:100%;margin-top:15px;padding:10px;font-size:16px;}
button{margin-top:20px;padding:15px;width:100%;background:white;color:black;font-size:18px;cursor:pointer;}
.questionBox{text-align:left;margin-top:20px;}
</style>
</head>
<body>

<div class="container">
<h1>지원서 작성</h1>
<input type="text" id="studentId" placeholder="학번 입력">
<div id="formArea"></div>
<button id="submitBtn">제출하기</button>
<p id="message"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
  authDomain: "songdo-exp-1e5a5.firebaseapp.com",
  databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "songdo-exp-1e5a5",
  storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
  messagingSenderId: "28967825486",
  appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const snapshot = await get(ref(db, "form/questions"));

let questions = [];
let index = 0;

if(snapshot.exists()){
    const data = snapshot.val();
    for(let key in data){

        questions.push(data[key]);

        let div = document.createElement("div");
        div.className = "questionBox";

        let label = document.createElement("p");
        label.innerText = data[key];

        let textarea = document.createElement("textarea");
        textarea.id = "answer" + index;

        div.appendChild(label);
        div.appendChild(textarea);
        document.getElementById("formArea").appendChild(div);

        index++;
    }
}

document.getElementById("submitBtn").onclick = async function(){

    let studentId = document.getElementById("studentId").value;
    if(!studentId){
        alert("학번 입력하세요");
        return;
    }

    let answers = {};

    for(let i=0; i<questions.length; i++){
        answers[i] = document.getElementById("answer"+i).value;
    }

    await set(ref(db, "applications/" + studentId), {
        answers: answers
    });

    document.getElementById("message").innerText = "제출 완료!";
};

</script>
</body>
</html>
