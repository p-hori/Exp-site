<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>м§Җмӣҗм„ң мһ‘м„ұ</title>
<style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}
.container{
    width:500px;
    margin:50px auto;
}
input, textarea{
    width:100%;
    margin-top:15px;
    padding:10px;
    font-size:16px;
}
button{
    margin-top:20px;
    padding:15px;
    width:100%;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
}
.questionBox{
    text-align:left;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">
<h1>м§Җмӣҗм„ң мһ‘м„ұ</h1>

<input type="text" id="studentId" placeholder="н•ҷлІҲ мһ…л Ҙ">

<div id="formArea"></div>

<button id="submitBtn">м ңм¶ңн•ҳкё°</button>

<p id="message"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  authDomain: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  databaseURL: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  projectId: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  storageBucket: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  messagingSenderId: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ",
  appId: "рҹ”Ҙм—¬кё°м—җл„Өкәјрҹ”Ҙ"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// рҹ”Ҙ м„Өл¬ё м§Ҳл¬ё л¶Ҳлҹ¬мҳӨкё°
const snapshot = await get(ref(db, "form/questions"));

let questions = [];
let index = 0;

if(snapshot.exists()){
    const data = snapshot.val();
    for(let key in data){
        questions.push(data[key]);

        let div = document.createElement("div");
        div.className = "questionBox";

        let label = document.createElement("p");
        label.innerText = data[key];

        let textarea = document.createElement("textarea");
        textarea.id = "answer" + index;

        div.appendChild(label);
        div.appendChild(textarea);

        document.getElementById("formArea").appendChild(div);

        index++;
    }
}

// рҹ”Ҙ м ңм¶ң
document.getElementById("submitBtn").onclick = async function(){

    let studentId = document.getElementById("studentId").value;

    if(!studentId){
        alert("н•ҷлІҲмқ„ мһ…л Ҙн•ҳм„ёмҡ”.");
        return;
    }

    let answers = {};

    for(let i=0; i<questions.length; i++){
        answers[i] = document.getElementById("answer"+i).value;
    }

    await set(ref(db, "applications/" + studentId), {
        answers: answers
    });

    document.getElementById("message").innerText = "м ңм¶ң мҷ„лЈҢ!";
};

</script>

</body>
</html>
