<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp-site 메인</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: Arial, sans-serif; }
        .container { margin-top: 100px; }
        button { 
            margin: 10px; padding: 15px 30px; font-size: 18px; 
            cursor: pointer; background: white; color: black; border: none; border-radius: 5px;
        }
        #adminPanel { 
            margin-top: 20px; padding: 20px; border: 1px gray dashed; display: none; 
        }
        .admin-btn { background: #555; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Exp Student Management</h1>
        <p>원하는 작업을 선택하세요.</p>
        
        <button id="applyBtn">지원하기</button>
        <button id="checkBtn">합격여부 확인</button>

        <br><br>

        <button id="admin" style="font-size: 14px; background: #333; color: #ccc;">관리자 메뉴</button>
        
        <div id="adminPanel">
            <h3>관리자 패널</h3>
            <button id="writeApply" class="admin-btn">설문 양식 만들기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
            authDomain: "songdo-exp-1e5a5.firebaseapp.com",
            databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "songdo-exp-1e5a5",
            storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
            messagingSenderId: "28967825486",
            appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 안전한 이벤트 연결 함수 ---
        // 요소가 존재할 때만 이벤트를 연결하여 'null' 에러를 방지합니다.
        const setClick = (id, callback) => {
            const el = document.getElementById(id);
            if (el) el.onclick = callback;
        };

        // 1. 관리자 패널 토글
        setClick("admin", () => {
            const panel = document.getElementById("adminPanel");
            if (panel) {
                panel.style.display = panel.style.display === "none" ? "block" : "none";
            }
        });

        // 2. 관리자 → 설문 제작 페이지 이동
        setClick("writeApply", () => {
            window.location.href = "form-admin.html";
        });

        // 3. 학생 → 지원하기 페이지 이동
        setClick("applyBtn", () => {
            window.location.href = "apply.html";
        });

        // 4. 합격여부 확인
        setClick("checkBtn", () => {
            let studentId = prompt("학번을 입력하세요");
            if (studentId) {
                // 주의: result.html 파일이 실제로 있어야 합니다.
                window.location.href = "result.html?studentId=" + studentId;
            }
        });

    </script>
</body>
</html>
