<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp Project</title>
    <style>
        /* 기본 배경 및 폰트 */
        body { background: #0a0a0a; color: white; text-align: center; font-family: 'Pretendard', 'Arial', sans-serif; margin: 0; }
        
        .admin-header { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #adminIcon { font-size: 24px; cursor: pointer; background: none; border: none; color: #444; transition: 0.3s; }
        #adminIcon:hover { color: white; }

        .main-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* 로고 영역: 어두운 파란색 직사각형 포인트 */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }
        .logo-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%); /* 글자 위치에 맞춰 미세 조정 */
            width: 260px; /* 직사각형 가로 길이 */
            height: 100px; /* 직사각형 세로 길이 */
            background: #001f3f; /* 어두운 파란색 (Navy) */
            z-index: -1; /* 글자 뒤로 배치 */
            border-radius: 4px;
        }
      .logo { 
            font-size: 110px; 
            font-weight: 900; 
            letter-spacing: 8px; 
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            
            /* 글자 내부 색상: 흰색 */
            color: white; 

            /* 방법 2 적용: 연한 하늘색(Cyan) 테두리 */
            /* -webkit-text-stroke: 2px #00e5ff; */

            /* 조금 더 은은하게 빛나는 효과를 원한다면 아래 shadow를 추천합니다 */
            text-shadow: 
                -2px -2px 0 #00e5ff,  
                 2px -2px 0 #00e5ff,
                -2px  2px 0 #00e5ff,
                 2px  2px 0 #00e5ff,
                 0 0 15px rgba(0, 229, 255, 0.6); /* 네온처럼 살짝 번지는 효과 추가 */
        }
        }

        /* 입력창 스타일 */
        .input-box { margin-bottom: 20px; }
        input.student-input { 
            padding: 16px; 
            font-size: 18px; 
            width: 300px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            border-radius: 8px; 
            outline: none; 
            transition: 0.3s;
        }
        input.student-input:focus { border-color: #0044cc; box-shadow: 0 0 10px rgba(0, 68, 204, 0.5); }

        /* 조회 버튼 스타일 */
        .rect-btn { 
            width: 334px; 
            height: 60px; 
            background: #0044cc; /* 버튼도 파란색 계열로 통일 */
            color: white; 
            border: none; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            border-radius: 8px; 
        }
        .rect-btn:hover { background: #0055ff; transform: translateY(-2px); }
        .rect-btn:active { transform: translateY(0); }
        
        /* 결과창 스타일 */
        #resultDisplay { margin-top: 30px; font-size: 20px; color: #00FF00; min-height: 40px; font-weight: 500; }

        /* 관리자 패널 (기존 로직 유지) */
        #adminPanel { display: none; background: #111; padding: 40px; width: 100%; box-sizing: border-box; border-top: 1px solid #333; }
        textarea { width: 300px; height: 80px; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        .save-btn { background: white; color: black; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }
        
        #applicantListSection { margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 10px; display: inline-block; min-width: 320px; text-align: left; }
        .applicant-item { padding: 10px; border-bottom: 1px solid #333; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div class="admin-header"><button id="adminIcon">⚙️</button></div>

    <div class="main-container">
        <div class="logo-wrapper">
            <div class="logo-box"></div>
            <h1 class="logo">Exp</h1>
        </div>
        
        <div class="input-box">
            <input type="number" id="studentIdInput" class="student-input" placeholder="학번을 입력해주세요">
        </div>

        <button class="rect-btn" id="checkBtn">합격여부 확인하기</button>
        
        <div id="resultDisplay"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color: #666;">관리자 모드</h2>
        <input type="number" id="targetId" placeholder="학번 입력" style="margin-bottom:10px; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px;"><br>
        <textarea id="statusMsg" maxlength="100" placeholder="메시지 입력 (100자)"></textarea><br>
        <button id="saveBtn" class="save-btn">메시지 저장하기</button>
        
        <button id="goFormAdmin" style="background:none; color: #555; border:none; display:block; margin: 25px auto; cursor:pointer;">[설문 문항 관리 이동]</button>

        <div id="applicantListSection">
            <h4 style="margin: 0 0 15px 0; color: #888;">📝 지원서 작성 완료 명단</h4>
            <button id="loadApplicants" style="margin-bottom:15px; cursor:pointer; padding: 6px 12px; background: #333; color: #ccc; border: none; border-radius: 4px;">명단 새로고침</button>
            <div id="listDisplay">작성된 명단이 없습니다.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
            authDomain: "songdo-exp-1e5a5.firebaseapp.com",
            databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "songdo-exp-1e5a5",
            storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
            messagingSenderId: "28967825486",
            appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 관리자 진입
        document.getElementById("adminIcon").onclick = function() {
            let pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === "Exp0001") {
                document.getElementById("adminPanel").style.display = "block";
                window.scrollTo(0, document.body.scrollHeight);
                loadApplicants(); 
            } else { alert("비밀번호가 틀렸습니다."); }
        };

        async function loadApplicants() {
            const listDisplay = document.getElementById("listDisplay");
            listDisplay.innerText = "불러오는 중...";
            const snapshot = await get(ref(db, "applications"));
            if(snapshot.exists()) {
                listDisplay.innerHTML = "";
                const data = snapshot.val();
                for(let studentId in data) {
                    let div = document.createElement("div");
                    div.className = "applicant-item";
                    div.innerText = "학번: " + studentId;
                    listDisplay.appendChild(div);
                }
            } else { listDisplay.innerText = "작성된 명단이 없습니다."; }
        }

        document.getElementById("loadApplicants").onclick = loadApplicants;

        document.getElementById("saveBtn").onclick = async function() {
            const id = document.getElementById("targetId").value;
            const msg = document.getElementById("statusMsg").value;
            if(!id || !msg) return alert("학번과 메시지를 입력하세요.");
            await set(ref(db, "students/" + id), { message: msg });
            alert(id + "번 저장 완료!");
            document.getElementById("targetId").value = '';
            document.getElementById("statusMsg").value = '';
        };

        async function checkStatus() {
            const studentId = document.getElementById("studentIdInput").value;
            const resultDisplay = document.getElementById("resultDisplay");
            if(!studentId) {
                resultDisplay.innerText = "학번을 먼저 입력해주세요.";
                resultDisplay.style.color = "#ff4444";
                return;
            }
            resultDisplay.innerText = "조회 중...";
            resultDisplay.style.color = "white";
            const snapshot = await get(ref(db, "students/" + studentId));
            if(snapshot.exists()) {
                resultDisplay.innerText = snapshot.val().message;
                resultDisplay.style.color = "#00FF00";
            } else {
                resultDisplay.innerText = "일치하는 학번 정보가 없습니다.";
                resultDisplay.style.color = "#ff4444";
            }
        }

        document.getElementById("checkBtn").onclick = checkStatus;
        document.getElementById("studentIdInput").onkeypress = (e) => { if(e.key === 'Enter') checkStatus(); };
        document.getElementById("goFormAdmin").onclick = () => window.location.href = "form-admin.html";
    </script>
</body>
</html>
