<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Exp Project</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        
        /* 헤더 및 관리자 아이콘 */
        .header { position: relative; height: 100px; }
        #adminIcon { 
            position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; 
            background: none; border: 1px solid white; color: white; padding: 5px 10px;
        }

        /* 메인 로고 */
        .main-logo { font-size: 80px; font-weight: bold; margin-top: 50px; }

        /* 중앙 버튼 디자인 (검은 직사각형) */
        .btn-container { margin-top: 30px; }
        .rect-btn {
            width: 300px; height: 60px; background: black; color: white; border: 2px solid white;
            font-size: 18px; cursor: pointer; margin: 10px auto; display: block;
        }
        .rect-btn:hover { background: #222; }

        /* 입력창 및 결과창 */
        #inputSection { margin-top: 20px; display: none; }
        input { padding: 10px; font-size: 16px; width: 250px; margin-bottom: 10px; }
        #resultDisplay { margin-top: 20px; font-size: 20px; color: yellow; min-height: 30px; }

        /* 관리자 설정창 */
        #adminPanel { display: none; background: #1a1a1a; padding: 20px; margin-top: 20px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <button id="adminIcon">⚙️</button>
    </div>

    <div class="main-logo">Exp</div>

    <div class="btn-container">
        <button class="rect-btn" id="goApply">지원서 작성하기</button>
        
        <button class="rect-btn" id="checkBtn">합격여부 확인하기</button>
    </div>

    <div id="inputSection">
        <input type="number" id="studentIdInput" placeholder="학번을 입력하세요 (예: 10314)">
        <div id="resultDisplay"></div>
    </div>

    <div id="adminPanel">
        <h3>관리자 설정 (학번별 메시지 입력)</h3>
        <input type="number" id="targetId" placeholder="설정할 학번 (예: 10314)"><br>
        <textarea id="statusMsg" maxlength="100" placeholder="해당 학생의 합격 여부를 알려주세요 (최대 100자)" style="width:300px; height:80px;"></textarea><br>
        <button id="saveBtn" style="padding:10px 20px; cursor:pointer;">메시지 저장하기</button>
        <button id="goFormAdmin" style="display:block; margin: 10px auto; background:#444; color:white;">설문 문항 관리로 이동</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
            authDomain: "songdo-exp-1e5a5.firebaseapp.com",
            databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "songdo-exp-1e5a5",
            storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
            messagingSenderId: "28967825486",
            appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. 관리자 설정 아이콘 누르기 (비밀번호 확인)
        document.getElementById("adminIcon").onclick = function() {
            let pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === "Exp0001") {
                alert("확인되었습니다.");
                document.getElementById("adminPanel").style.display = "block";
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        };

        // 2. 관리자: 학번-메시지 일대일 매칭 저장
        document.getElementById("saveBtn").onclick = async function() {
            const id = document.getElementById("targetId").value;
            const msg = document.getElementById("statusMsg").value;

            if(!id || !msg) {
                alert("학번과 메시지를 모두 입력하세요.");
                return;
            }

            await set(ref(db, "students/" + id), { message: msg });
            alert(id + "번 메시지 저장 완료!");
            document.getElementById("targetId").value = "";
            document.getElementById("statusMsg").value = "";
        };

        // 3. 학생: 합격여부 확인하기 (검은 직사각형 클릭)
        document.getElementById("checkBtn").onclick = function() {
            alert("학번을 쳐 주세요.");
            document.getElementById("inputSection").style.display = "block";
            document.getElementById("studentIdInput").focus();
        };

        // 4. 학생: 학번 입력 시 실시간/엔터로 결과 출력
        document.getElementById("studentIdInput").onkeypress = async function(e) {
            if(e.key === 'Enter') {
                const id = this.value;
                const snapshot = await get(ref(db, "students/" + id));
                
                if(snapshot.exists()) {
                    document.getElementById("resultDisplay").innerText = snapshot.val().message;
                } else {
                    document.getElementById("resultDisplay").innerText = "등록된 정보가 없는 학번입니다.";
                }
            }
        };

        // 5. 지원서 작성 페이지로 이동
        document.getElementById("goApply").onclick = function() {
            window.location.href = "apply.html";
        };

        // 6. 설문 관리 페이지로 이동
        document.getElementById("goFormAdmin").onclick = function() {
            window.location.href = "form-admin.html";
        };
    </script>
</body>
</html>
