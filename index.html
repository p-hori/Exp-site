<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exp Project</title>
    <style>
        /* 1. 전체 배경 및 레이아웃 */
        body { 
            background: radial-gradient(circle at center, #001529 0%, #000810 100%); 
            color: white; 
            text-align: center; 
            font-family: 'Pretendard', 'Arial', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-header { position: absolute; top: 20px; right: 20px; z-index: 100; }
        #adminIcon { font-size: 24px; cursor: pointer; background: none; border: none; color: rgba(255,255,255,0.2); transition: 0.3s; }
        #adminIcon:hover { color: white; }

        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 2. 로고 영역: 리얼 글래스모피즘 */
        .logo-wrapper {
            position: relative;
            padding: 40px 80px;
            margin-bottom: 50px;
        }
        .logo-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 140px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 229, 255, 0.1);
            z-index: -1;
        }
        .logo { 
            font-size: 110px; 
            font-weight: 800; 
            letter-spacing: 12px;
            margin: 0;
            background: linear-gradient(180deg, #fff 30%, #7dd3fc 50%, #0ea5e9 70%, #075985 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.4));
        }

        /* 3. 입력창 & 버튼 (세련된 다크 스타일) */
        .input-box { margin-bottom: 20px; }
        input.student-input { 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 320px;
            padding: 18px;
            font-size: 16px;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.4s;
        }
        input.student-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .rect-btn { 
            width: 358px; 
            height: 60px; 
            background: linear-gradient(90deg, #0284c7, #0369a1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.3);
        }
        .rect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(2, 132, 199, 0.5);
            background: linear-gradient(90deg, #0ea5e9, #0284c7);
        }
        
        #resultDisplay { margin-top: 35px; font-size: 20px; color: #00FF00; min-height: 40px; font-weight: 500; }

        /* 4. 관리자 패널 */
        #adminPanel { display: none; background: #050505; padding: 40px; width: 100%; box-sizing: border-box; border-top: 1px solid #222; }
        textarea { width: 300px; height: 80px; padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 8px; }
        .save-btn { background: #eee; color: black; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 8px; }
        #applicantListSection { margin-top: 30px; padding: 20px; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; display: inline-block; min-width: 320px; text-align: left; }
    </style>
</head>
<body>

    <div class="admin-header"><button id="adminIcon">⚙️</button></div>

    <div class="main-container">
        <div class="logo-wrapper">
            <div class="logo-box"></div>
            <h1 class="logo">Exp</h1>
        </div>
        
        <div class="input-box">
            <input type="number" id="studentIdInput" class="student-input" placeholder="학번을 입력해주세요">
        </div>

        <button class="rect-btn" id="checkBtn">합격여부 확인하기</button>
        
        <div id="resultDisplay"></div>
    </div>

    <div id="adminPanel">
        <h2 style="color: #444;">Admin Mode</h2>
        <input type="number" id="targetId" placeholder="학번 입력" style="margin-bottom:10px; padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 8px;"><br>
        <textarea id="statusMsg" maxlength="100" placeholder="결과 메시지 입력"></textarea><br>
        <button id="saveBtn" class="save-btn">메시지 저장하기</button>
        
        <button id="goFormAdmin" style="background:none; color: #333; border:none; display:block; margin: 25px auto; cursor:pointer;">[Manage Questions]</button>

        <div id="applicantListSection">
            <h4 style="margin: 0 0 15px 0; color: #666;">📝 Applicant List</h4>
            <button id="loadApplicants" style="margin-bottom:15px; cursor:pointer; padding: 6px 12px; background: #222; color: #888; border: 1px solid #333; border-radius: 6px;">Refresh</button>
            <div id="listDisplay">No applicants found.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        // 기존에 사용하시던 Firebase 설정값 그대로 유지
        const firebaseConfig = {
            apiKey: "AIzaSyBryQrZLhfJoJs_0AxNZJkDglU5lxrVzzE",
            authDomain: "songdo-exp-1e5a5.firebaseapp.com",
            databaseURL: "https://songdo-exp-1e5a5-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "songdo-exp-1e5a5",
            storageBucket: "songdo-exp-1e5a5.firebasestorage.app",
            messagingSenderId: "28967825486",
            appId: "1:28967825486:web:fb67a5ca2da1cb4996931f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // [이전과 동일한 기능 로직들...]
        document.getElementById("adminIcon").onclick = function() {
            let pw = prompt("관리자 비밀번호를 입력하세요.");
            if(pw === "Exp0001") {
                document.getElementById("adminPanel").style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                loadApplicants(); 
            } else { alert("비밀번호가 틀렸습니다."); }
        };

        async function loadApplicants() {
            const listDisplay = document.getElementById("listDisplay");
            listDisplay.innerText = "Loading...";
            const snapshot = await get(ref(db, "applications"));
            if(snapshot.exists()) {
                listDisplay.innerHTML = "";
                const data = snapshot.val();
                for(let studentId in data) {
                    let div = document.createElement("div");
                    div.style.cssText = "padding: 10px; border-bottom: 1px solid #111; color: #555; font-size: 14px;";
                    div.innerText = "학번: " + studentId;
                    listDisplay.appendChild(div);
                }
            } else { listDisplay.innerText = "No data."; }
        }

        document.getElementById("loadApplicants").onclick = loadApplicants;

        document.getElementById("saveBtn").onclick = async function() {
            const id = document.getElementById("targetId").value;
            const msg = document.getElementById("statusMsg").value;
            if(!id || !msg) return alert("학번과 메시지를 입력하세요.");
            await set(ref(db, "students/" + id), { message: msg });
            alert(id + "번 저장 완료!");
            document.getElementById("targetId").value = '';
            document.getElementById("statusMsg").value = '';
        };

        async function checkStatus() {
            const studentId = document.getElementById("studentIdInput").value;
            const resultDisplay = document.getElementById("resultDisplay");
            if(!studentId) {
                resultDisplay.innerText = "학번을 먼저 입력해주세요.";
                resultDisplay.style.color = "#ff4444";
                return;
            }
            resultDisplay.innerText = "조회 중...";
            resultDisplay.style.color = "white";
            const snapshot = await get(ref(db, "students/" + studentId));
            if(snapshot.exists()) {
                resultDisplay.innerText = snapshot.val().message;
                resultDisplay.style.color = "#00FF00";
            } else {
                resultDisplay.innerText = "일치하는 학번 정보가 없습니다.";
                resultDisplay.style.color = "#ff4444";
            }
        }

        document.getElementById("checkBtn").onclick = checkStatus;
        document.getElementById("studentIdInput").onkeypress = (e) => { if(e.key === 'Enter') checkStatus(); };
        document.getElementById("goFormAdmin").onclick = () => window.location.href = "form-admin.html";
    </script>
</body>
</html>
